<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Papers I'm Reading</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a1a; --muted: #666; --line: #e6e6e6;
    --card: #fafafa; --accent: #2563eb; --chip: #eef2ff; --chipfg: #3730a3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161a; --fg: #e8e8e8; --muted: #9aa0a6; --line: #2a2e35;
      --card: #1b1e24; --accent: #6ea8fe; --chip: #23263a; --chipfg: #b9c2ff;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  header { padding: 28px 20px 12px; max-width: 900px; margin: 0 auto; }
  h1 { margin: 0 0 4px; font-size: 24px; }
  .meta { color: var(--muted); font-size: 13px; }
  .controls {
    position: sticky; top: 0; background: var(--bg); z-index: 5;
    padding: 12px 20px; max-width: 900px; margin: 0 auto;
    display: flex; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid var(--line);
  }
  input[type=search], select {
    font: inherit; padding: 8px 10px; border: 1px solid var(--line);
    border-radius: 8px; background: var(--card); color: var(--fg);
  }
  input[type=search] { flex: 1 1 260px; }
  main { max-width: 900px; margin: 0 auto; padding: 8px 20px 60px; }
  .paper {
    border: 1px solid var(--line); background: var(--card);
    border-radius: 10px; padding: 14px 16px; margin: 12px 0;
  }
  .paper h2 { margin: 0 0 4px; font-size: 17px; line-height: 1.35; }
  .paper h2 a { color: var(--fg); text-decoration: none; }
  .paper h2 a:hover { color: var(--accent); text-decoration: underline; }
  .authors { color: var(--fg); font-size: 13.5px; margin: 2px 0; }
  .venue { color: var(--muted); font-size: 13px; margin: 2px 0 6px; }
  .abstract { font-size: 14px; color: var(--fg); margin: 8px 0 0; }
  .abstract.clamp {
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
  .chip {
    font-size: 11px; padding: 2px 8px; border-radius: 999px;
    background: var(--chip); color: var(--chipfg); text-transform: uppercase;
    letter-spacing: .03em;
  }
  .toggle { font-size: 12px; color: var(--accent); cursor: pointer; background: none; border: none; padding: 0; }
  a.pdf { font-size: 13px; color: var(--accent); text-decoration: none; }
  a.pdf:hover { text-decoration: underline; }
  .empty { color: var(--muted); text-align: center; padding: 40px; }
</style>
</head>
<body>
<header>
  <h1>Papers I'm Reading</h1>
  <div class="meta" id="summary">Loading…</div>
</header>
<div class="controls">
  <input type="search" id="q" placeholder="Search title, author, journal, abstract…" autocomplete="off" />
  <select id="sort">
    <option value="added">Recently added</option>
    <option value="published">Publication date</option>
    <option value="title">Title A–Z</option>
  </select>
</div>
<main id="list"><div class="empty">Loading…</div></main>

<script>
const state = { data: [], q: "", sort: "added" };

function esc(s) {
  return (s || "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
}

function fmtDate(s) {
  if (!s) return "";
  const m = /^(\d{4})(?:-(\d{2}))?(?:-(\d{2}))?/.exec(s);
  if (!m) return s;
  const months = ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  let out = m[1];
  if (m[2]) out = months[+m[2]] + " " + out;
  return out;
}

function matches(p, q) {
  if (!q) return true;
  const hay = [p.title, (p.authors||[]).join(" "), p.journal, p.abstract].join(" ").toLowerCase();
  return q.toLowerCase().split(/\s+/).every(t => hay.includes(t));
}

function sortKey(p) {
  if (state.sort === "title") return (p.title || "").toLowerCase();
  if (state.sort === "published") return p.published || "";
  return p.added_at || "";
}

function render() {
  const list = document.getElementById("list");
  let rows = state.data.filter(p => matches(p, state.q));
  rows.sort((a, b) => {
    const ka = sortKey(a), kb = sortKey(b);
    return state.sort === "title" ? ka.localeCompare(kb) : kb.localeCompare(ka);
  });

  document.getElementById("summary").textContent =
    `${state.data.length} papers${state.q ? ` · ${rows.length} match` : ""}`;

  if (!rows.length) { list.innerHTML = `<div class="empty">No matching papers.</div>`; return; }

  list.innerHTML = rows.map(p => {
    const authors = (p.authors || []).join(", ");
    const venue = [esc(p.journal), fmtDate(p.published)].filter(Boolean).join(" · ");
    const titleHtml = p.pdf_url
      ? `<a href="${esc(p.pdf_url)}" target="_blank" rel="noopener">${esc(p.title)}</a>`
      : esc(p.title);
    const pdfLink = p.pdf_url
      ? `<a class="pdf" href="${esc(p.pdf_url)}" target="_blank" rel="noopener">PDF ↗</a>` : "";
    const kind = p.pdf_url_kind && p.pdf_url_kind !== "none"
      ? `<span class="chip">${esc(p.pdf_url_kind)}</span>` : "";
    const abs = p.abstract
      ? `<p class="abstract clamp">${esc(p.abstract)}</p>
         <button class="toggle">Show more</button>` : "";
    return `<article class="paper">
      <h2>${titleHtml}</h2>
      ${authors ? `<div class="authors">${esc(authors)}</div>` : ""}
      ${venue ? `<div class="venue">${venue}</div>` : ""}
      ${abs}
      <div class="row">${kind}${pdfLink}</div>
    </article>`;
  }).join("");

  list.querySelectorAll(".toggle").forEach(btn => {
    btn.addEventListener("click", () => {
      const a = btn.previousElementSibling;
      const clamped = a.classList.toggle("clamp");
      btn.textContent = clamped ? "Show more" : "Show less";
    });
  });
}

document.getElementById("q").addEventListener("input", e => { state.q = e.target.value; render(); });
document.getElementById("sort").addEventListener("change", e => { state.sort = e.target.value; render(); });

fetch("data/references.json?_=" + Date.now())
  .then(r => r.ok ? r.json() : [])
  .then(d => { state.data = Array.isArray(d) ? d : []; render(); })
  .catch(() => { document.getElementById("list").innerHTML =
    `<div class="empty">Could not load references.json.</div>`; });
</script>
</body>
</html>
